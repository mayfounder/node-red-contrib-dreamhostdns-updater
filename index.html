<script type="text/javascript">
	RED.nodes.registerType('Dreamhost DNS Updater',{
		category: 'function',
		color: '#a6bbcf',
		credentials: {
			apiKey: {type:"text"},
		},
		defaults: {
			name: {value:""},
			domain: {value: ""},
			subdomain: {value: ""},
		},
		inputs:1,
		outputs:1,
		icon: "bridge.png",
		align: "right",
		inputLabels: "trigger",
		outputLabels: ["status"],
		label: function() {
			return this.name||"Dreamhost DNS Updater";
		}
	});
</script>

<script type="text/html" data-template-name="Dreamhost DNS Updater">
	<div class="form-row">
		<label for="node-input-name"><i class="icon-tag"></i> Name</label>
		<input type="text" id="node-input-name" placeholder="Name">
	</div>
	<div class="form-row">
		<label for="node-input-domain"><i class="icon-tag"></i> Dreamhost Domain</label>
		<input type="text" id="node-input-domain" placeholder="mydomain.com">
	</div>
	<div class="form-row">
		<label for="node-input-subdomain"><i class="icon-tag"></i> Dreamhost Sub-Domain</label>
		<input type="text" id="node-input-subdomain" placeholder="subdomain">
	</div>
	<div class="form-row">
  	<label for="node-input-apiKey"><i class="icon-tag"></i> Dreamhost API Key</label>
  	<input type="text" id="node-input-apiKey" placeholder="key">
	</div>
</script>

<script type="text/html" data-help-name="Dreamhost DNS Updater">
	<p>Updates a DreamHost DNS A / AAAA record for the configured subdomain using your machine&apos;s current public IP address.</p>
	<p>Public IPv4 and IPv6 are resolved automatically via the <code>public-ip</code> npm package when you inject any message. Optionally override with <code>msg.payload.publicIPv4</code> and/or <code>msg.payload.publicIPv6</code> (valid IPs only). Use <code>msg.payload.ipLookupTimeout</code> (milliseconds) to override the default lookup timeout.</p>
</script>
